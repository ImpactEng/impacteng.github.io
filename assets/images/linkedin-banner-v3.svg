<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- Dark background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#162230" />
      <stop offset="100%" stop-color="#2c3e50" />
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bgGrad)" />

  <!-- Accent stripe — left edge -->
  <rect x="0" y="0" width="6" height="396" fill="#007acc" />

  <!-- Left-aligned content starting at x=480, within mobile safe zone (475–1109) -->

  <!-- Main hook — large, bold, white -->
  <text x="480" y="105" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="48">
    Your AI agents will fail without
  </text>
  <text x="480" y="160" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="48">
    the right infrastructure.
  </text>

  <!-- Punch line — large accent blue -->
  <text x="480" y="250" fill="#007acc" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="68">
    I fix that.
  </text>

  <!-- Accent line under punchline -->
  <line x1="480" y1="270" x2="820" y2="270" stroke="#007acc" stroke-width="3" />

  <!-- Subtitle + Domain — bottom row -->
  <text x="480" y="330" fill="#95a5a6" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="24" letter-spacing="2">
    CLOUD + DEVOPS + AI READINESS
  </text>

  <!-- Domain as CTA — prominent, bottom right of safe zone -->
  <text x="480" y="370" fill="#007acc" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="30">
    impacteng.com.au
  </text>
</svg>
