{%- unless page.url == "/" -%}
{%- assign crumb_parts = page.url | split: "/" | compact -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    }{%- assign position = 2 -%}{%- assign path = "" -%}
    {%- for part in crumb_parts -%}
    {%- assign path = path | append: "/" | append: part -%}
    ,{
      "@type": "ListItem",
      "position": {{ position }},
      "name": {{ part | replace: "-", " " | capitalize | jsonify }},
      "item": "{{ site.url }}{{ path }}/"
    }{%- assign position = position | plus: 1 -%}
    {%- endfor %}
  ]
}
</script>
{%- endunless -%}
