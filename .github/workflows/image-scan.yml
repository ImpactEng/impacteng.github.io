name: Weekly Image Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  repository-advisories: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: 'ruby:3.3-slim'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
        continue-on-error: true

      - name: Create private security advisory on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const existing = await github.rest.securityAdvisories.listRepositoryAdvisories({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'draft'
            });
            const alreadyOpen = existing.data.some(a =>
              a.summary.includes('ruby:3.3-slim')
            );
            if (!alreadyOpen) {
              await github.rest.securityAdvisories.createRepositoryAdvisory({
                owner: context.repo.owner,
                repo: context.repo.repo,
                summary: 'Fixable CVEs detected in Docker base image (ruby:3.3-slim)',
                description: `Trivy found critical or high severity vulnerabilities with available fixes in \`ruby:3.3-slim\`.\n\nRebuild the Docker image to pull the latest patched layers, then re-run the scan to confirm it is resolved.\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                severity: 'high',
                vulnerabilities: []
              });
            }
