name: Weekly Link Check

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.4'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Check links
        run: |
          bundle exec htmlproofer ./_site \
            --checks "Links,Images" \
            --allow-hash-href \
            --ignore-urls "/impacteng\.com\.au/,/linkedin\.com/,/twitter\.com/,/x\.com/,/formspree\.io/,/use\.fontawesome\.com/" \
            --only-4xx
        continue-on-error: true

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-links',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Broken links detected by weekly link checker',
                body: `The weekly link checker found broken links.\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['broken-links']
              });
            }
