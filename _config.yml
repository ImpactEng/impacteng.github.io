# Site settings
# https://github.com/jekyll/minima/tree/2.5-stable
title: Cloud, DevOps & AI Readiness Consulting | ImpactEng
description: >-
  We help engineering teams build the Cloud and DevOps foundations AI agents actually need. Fixed-price assessments. Embedded execution. Real outcomes.
lang: en-AU
baseurl: "" # Set to "/repository-name" if hosted in a subdirectory
url: "https://impacteng.com.au"
email: hi@impacteng.com.au
booking_url: "https://calendar.app.google/RgJtyQVimhpUgbTE7"
#twitter_username: impactengx
#github_username: impacteng
linkedin_username: impactengx
google_analytics: G-89R5ETTN6P
show_downloads: false

# To display post-excerpts on the Home Page, simply add the following to your _config.yml:
show_excerpts: true

# Build settings
markdown: kramdown
theme: minima
plugins:
  - github-pages
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

excerpt_separator: "<!--more-->"

header_pages:
  - index.md
  - about.md
  - services.md
  - blog.md
  - contact.md

# Default OG image (used by jekyll-seo-tag when no page-specific image is set)
image: /assets/images/og-image.jpg

# Minima settings
minima:
  skin: default # You can explore other skins
  hide_site_feed_link: true
  date_format: "%b %-d, %Y"

# GitHub Pages settings
#github:
#  is_project_page: false

# Security settings
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - docker-compose.yml
  - vendor/
  - scripts/
  - patches/
  - .github/
  - README.md
  - readme.md
  - .gitignore
  - AGENTS.md
  - .clinerules
  - .cursorrules
  - .windsurfrules
  - ../ # Prevent including parent directory

include:
  - .well-known/

# Output
destination: ./_site